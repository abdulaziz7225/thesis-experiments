# Rust + Docker (OCI / runc) variant — 03-http-fanout (I/O-bound)
# NodePort: 30083  →  pod :8080
#
# Build & push:
#   docker build -t docker.io/abdulaziz7225/http-fanout-docker-rust:latest \
#          docker/rust/03-http-fanout/
#   docker push  docker.io/abdulaziz7225/http-fanout-docker-rust:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-fanout-docker-rust
  namespace: http-fanout
  labels:
    app:     http-fanout-docker-rust
    variant: docker-rust
    experiment: "03-http-fanout"
    workload-class: "io-bound"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-fanout-docker-rust
  template:
    metadata:
      labels:
        app:     http-fanout-docker-rust
        variant: docker-rust
    spec:
      containers:
        - name:  http-fanout-docker-rust
          image: docker.io/abdulaziz7225/http-fanout-docker-rust:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: RUST_LOG
              value: "info"
            # Default to 1 worker thread for the limited-mode baseline;
            # run_experiment.sh::apply_unlimited_threads raises this to 4 at
            # runtime for the unlimited-mode load test (matches the 4-vCPU ccx23).
            - name: TOKIO_WORKER_THREADS
              value: "1"
          resources:
            requests:
              cpu:    "250m"
              memory: "64Mi"
            limits:
              cpu:    "4000m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: http-fanout-docker-rust
  namespace: http-fanout
  labels:
    app:     http-fanout-docker-rust
    variant: docker-rust
spec:
  type: NodePort
  selector:
    app: http-fanout-docker-rust
  ports:
    - port:       8080
      targetPort: 8080
      nodePort:   30083
      name:       http
