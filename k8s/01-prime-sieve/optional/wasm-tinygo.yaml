# TinyGo + WasmEdge variant
# NodePort: 30086  →  pod :8080
# OPTIONAL: WasmEdge/WASI P1 comparison variant. Deploy only when ENABLE_WASMEDGE=true.
#
# Build & push:
#   docker build -t <docker.io/abdulaziz7225>/prime-sieve-wasm-tinygo:latest \
#          wasm/wasmedge/tinygo/01-prime-sieve/
#   docker push <docker.io/abdulaziz7225>/prime-sieve-wasm-tinygo:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-sieve-wasm-tinygo
  namespace: prime-sieve
  labels:
    app:     prime-sieve-wasm-tinygo
    variant: wasm-tinygo
    experiment: "01-prime-sieve"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prime-sieve-wasm-tinygo
  template:
    metadata:
      labels:
        app:     prime-sieve-wasm-tinygo
        variant: wasm-tinygo
      annotations:
        # Tells crun to delegate this container to the WasmEdge handler.
        run.oci.handler: wasmedge
        module.wasm.image/variant: compat
    spec:
      runtimeClassName: wasmedge
      containers:
        - name:  prime-sieve-wasm-tinygo
          image: docker.io/abdulaziz7225/prime-sieve-wasm-tinygo:latest
          command: ["/app.wasm"]
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu:    "250m"
              memory: "64Mi"
            limits:
              cpu:    "500m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: prime-sieve-wasm-tinygo
  namespace: prime-sieve
  labels:
    app:     prime-sieve-wasm-tinygo
    variant: wasm-tinygo
spec:
  type: NodePort
  selector:
    app: prime-sieve-wasm-tinygo
  ports:
    - port:       8080
      targetPort: 8080
      nodePort:   30086
      name:       http
