# Rust + WasmEdge variant
# NodePort: 30081  →  pod :8080
#
# Prerequisites:
#   1. RuntimeClass "wasmedge" exists (make deploy-stack in thesis-infra-setup)
#   2. Node is labelled with runtime.kwasm.sh/runtime=wasmedge (make label-node)
#   3. Image is built and pushed:
#        docker build -t <docker.io/abdulaziz7225>/prime-sieve-wasm-rust:latest \
#               wasm/rust/01-prime-sieve/
#        docker push <docker.io/abdulaziz7225>/prime-sieve-wasm-rust:latest
#      Then replace the image field below.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-sieve-wasm-rust
  namespace: prime-sieve
  labels:
    app:     prime-sieve-wasm-rust
    variant: wasm-rust
    experiment: "01-prime-sieve"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prime-sieve-wasm-rust
  template:
    metadata:
      labels:
        app:     prime-sieve-wasm-rust
        variant: wasm-rust
      annotations:
        # Tells crun to delegate this container to the WasmEdge handler.
        run.oci.handler: wasmedge
        module.wasm.image/variant: compat
    spec:
      runtimeClassName: wasmedge
      containers:
        - name:  prime-sieve-wasm-rust
          image: docker.io/abdulaziz7225/prime-sieve-wasm-rust:latest
          # imagePullPolicy: Always   # uncomment during active development
          command: ["/app.wasm"]
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu:    "250m"
              memory: "64Mi"
            limits:
              cpu:    "500m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: prime-sieve-wasm-rust
  namespace: prime-sieve
  labels:
    app:     prime-sieve-wasm-rust
    variant: wasm-rust
spec:
  type: NodePort
  selector:
    app: prime-sieve-wasm-rust
  ports:
    - port:       8080
      targetPort: 8080
      nodePort:   30081
      name:       http
