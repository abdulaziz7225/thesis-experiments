# Go + Docker (OCI / runc) variant
# NodePort: 30084  →  pod :8080
#
# Build & push:
#   docker build -t <docker.io/abdulaziz7225>/prime-sieve-docker-golang:latest \
#          docker/golang/01-prime-sieve/
#   docker push <docker.io/abdulaziz7225>/prime-sieve-docker-golang:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-sieve-docker-golang
  namespace: prime-sieve
  labels:
    app:     prime-sieve-docker-golang
    variant: docker-golang
    experiment: "01-prime-sieve"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prime-sieve-docker-golang
  template:
    metadata:
      labels:
        app:     prime-sieve-docker-golang
        variant: docker-golang
    spec:
      containers:
        - name:  prime-sieve-docker-golang
          image: docker.io/abdulaziz7225/prime-sieve-docker-golang:latest
          ports:
            - containerPort: 8080
              name: http
          # Default to 1 OS thread for the limited-mode baseline;
          # run_experiment.sh::apply_unlimited_threads raises this to 4 at
          # runtime for the unlimited-mode load test (matches the 4-vCPU ccx23).
          env:
            - name: GOMAXPROCS
              value: "1"
          resources:
            requests:
              cpu:    "250m"
              memory: "64Mi"
            limits:
              cpu:    "4000m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: prime-sieve-docker-golang
  namespace: prime-sieve
  labels:
    app:     prime-sieve-docker-golang
    variant: docker-golang
spec:
  type: NodePort
  selector:
    app: prime-sieve-docker-golang
  ports:
    - port:       8080
      targetPort: 8080
      nodePort:   30084
      name:       http
