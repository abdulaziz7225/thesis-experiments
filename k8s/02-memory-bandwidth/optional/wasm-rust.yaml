# Rust + WasmEdge variant — 02-memory-bandwidth (OPTIONAL)
# NodePort: 30085  →  pod :8080
# OPTIONAL: WasmEdge/WASI P1 comparison. Deploy only when ENABLE_WASMEDGE=true.
# See wasm/wasmedge/README.md for build instructions.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-bandwidth-wasm-rust
  namespace: memory-bandwidth
  labels:
    app:     memory-bandwidth-wasm-rust
    variant: wasm-rust
    experiment: "02-memory-bandwidth"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-bandwidth-wasm-rust
  template:
    metadata:
      labels:
        app:     memory-bandwidth-wasm-rust
        variant: wasm-rust
      annotations:
        run.oci.handler: wasmedge
        module.wasm.image/variant: compat
    spec:
      runtimeClassName: wasmedge
      containers:
        - name:  memory-bandwidth-wasm-rust
          image: docker.io/abdulaziz7225/memory-bandwidth-wasm-rust:latest
          command: ["/app.wasm"]
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu:    "250m"
              memory: "64Mi"
            limits:
              cpu:    "500m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: memory-bandwidth-wasm-rust
  namespace: memory-bandwidth
  labels:
    app:     memory-bandwidth-wasm-rust
    variant: wasm-rust
spec:
  type: NodePort
  selector:
    app: memory-bandwidth-wasm-rust
  ports:
    - port:       8080
      targetPort: 8080
      nodePort:   30085
      name:       http
