# Go + Docker (OCI / runc) variant — 02-memory-bandwidth
# NodePort: 30084  →  pod :8080
#
# Build & push:
#   docker build -t docker.io/abdulaziz7225/memory-bandwidth-docker-golang:latest \
#          docker/golang/02-memory-bandwidth/
#   docker push docker.io/abdulaziz7225/memory-bandwidth-docker-golang:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-bandwidth-docker-golang
  namespace: memory-bandwidth
  labels:
    app:     memory-bandwidth-docker-golang
    variant: docker-golang
    experiment: "02-memory-bandwidth"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-bandwidth-docker-golang
  template:
    metadata:
      labels:
        app:     memory-bandwidth-docker-golang
        variant: docker-golang
    spec:
      containers:
        - name:  memory-bandwidth-docker-golang
          image: docker.io/abdulaziz7225/memory-bandwidth-docker-golang:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GOMAXPROCS
              value: "1"
          resources:
            requests:
              cpu:    "250m"
              memory: "64Mi"
            limits:
              cpu:    "4000m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: memory-bandwidth-docker-golang
  namespace: memory-bandwidth
  labels:
    app:     memory-bandwidth-docker-golang
    variant: docker-golang
spec:
  type: NodePort
  selector:
    app: memory-bandwidth-docker-golang
  ports:
    - port:       8080
      targetPort: 8080
      nodePort:   30084
      name:       http
