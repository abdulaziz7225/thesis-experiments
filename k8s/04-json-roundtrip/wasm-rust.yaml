# Rust + SpinKube (Wasmtime/Cranelift / WASI P2) variant — 04-json-roundtrip
# NodePort: 30081  →  pod :80
#
# Prerequisites:
#   1. SpinOperator is deployed (make deploy in thesis-infra-setup)
#   2. RuntimeClass "wasmtime-spin" exists (make deploy)
#   3. Node is labelled with runtime.spin.sh/runtime=spin (make label)
#   4. Image is built and pushed via spin registry push (NOT docker push):
#        cd wasm/rust/04-json-roundtrip
#        cargo component build --release
#        spin registry push docker.io/abdulaziz7225/json-roundtrip-wasm-rust:latest
#
# Why SpinApp instead of Deployment: see 01-prime-sieve/wasm-rust.yaml.
# Why port 80: Spin's default HTTP listen port inside the component is 80.
---
apiVersion: core.spinkube.dev/v1alpha1
kind: SpinApp
metadata:
  name: json-roundtrip-wasm-rust
  namespace: json-roundtrip
  labels:
    variant: wasm-rust
    experiment: "04-json-roundtrip"
spec:
  image: docker.io/abdulaziz7225/json-roundtrip-wasm-rust:latest
  executor: containerd-shim-spin
  replicas: 1
  resources:
    requests:
      cpu:    "250m"
      memory: "64Mi"
    limits:
      cpu:    "4000m"
      memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: json-roundtrip-wasm-rust-np
  namespace: json-roundtrip
  labels:
    variant: wasm-rust
    experiment: "04-json-roundtrip"
spec:
  type: NodePort
  selector:
    core.spinkube.dev/app.json-roundtrip-wasm-rust.status: ready
  ports:
    - port:       80
      targetPort: 80
      nodePort:   30081
      name:       http
