[package]
name = "prime-sieve-spin"
version = "0.1.0"
edition = "2024"

# cdylib is required for Wasm Component Model exports generated by cargo-component.
[lib]
crate-type = ["cdylib"]

[dependencies]
spin-sdk  = "5.2.0"
serde_json = "1"

# cargo-component metadata: defines the component package name used in WIT worlds.
[package.metadata.component]
package = "component:prime-sieve-spin"

[profile.release]
opt-level     = "s"
lto           = true
codegen-units = 1
strip         = true
panic         = "abort"
