spin_manifest_version = 2

[application]
name = "memory-bandwidth-wasm-rust"
version = "0.1.0"
description = "memory-bandwidth HTTP service — Rust + SpinKube (WASI P2, Wasmtime/Cranelift)"

[[trigger.http]]
route = "/..."
component = "memory-bandwidth"

[component.memory-bandwidth]
# Concurrency for the WASI P1/P2 component is single-threaded per instance;
# horizontal scaling is governed by SpinApp `spec.replicas` in the k8s manifest.
source = "target/wasm32-wasip1/release/memory_bandwidth_spin.wasm"

[component.memory-bandwidth.build]
command = "cargo component build --release"
